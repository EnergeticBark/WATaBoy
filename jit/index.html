<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<script type="module" src="js/main.js"></script>
	<style>
		fieldset {
			max-width: fit-content;
		}
	
		#lcd {
			display: block;
			margin: 1rem auto;
			border: 1px solid;
			/* 2x scale. */
			width: 320px;
			height: 288px;
			image-rendering: pixelated;
		}
		
		@media (width >= 496px) {
		  #lcd {
			  /* 3x scale. */
			  width: 480px;
			  height: 432px;
			  
		  }
		}
		
		@media (width >= 656px) {
		  #lcd {
			  /* 4x scale. */
			  width: 640px;
			  height: 576px;
			  
		  }
		}
		
		kbd > kbd {
		  border-radius: 3px;
		  padding: 1px 2px 0;
		  border: 1px solid black;
		  box-shadow: 0 1px 1px darkgray;
		}
		
		#error-log pre {
			color: #ee0000;
			overflow: auto;
			border: 1px solid black;
		}
		
		#buttons {
			touch-action: none;
			-webkit-user-select: none;
			display: grid;
			grid-template-areas:
			  ".    up     .     .     ."
			  "left .      right b     a"
			  ".    down   .     .     ."
			  ".    select .     start .";
			grid-template-columns: repeat(5, minmax(3rem, 1fr));
		}
		
		.touch-button {
			border: 1px solid black;
			aspect-ratio: 1;
		}
		
		#up-button { grid-area: up; }
		#down-button { grid-area: down; }
		#left-button { grid-area: left; }
		#right-button { grid-area: right; }
		#a-button { grid-area: a; }
		#b-button { grid-area: b; }
		#start-button { grid-area: start; }
		#select-button { grid-area: select; }
		
		@media (pointer: fine) {
			#lcd {
				margin: 1rem 0;
			}
		
			#buttons {
				display: none;
			}
		}
	</style>
	<title>WATaBoy</title>
</head>
<body>
	<hgroup>
		<h1>WATaBoy</h1>
		<p>An SM83 -> Wasm dynamic recompiler</p>
	</hgroup>
	<a href="./saves.html">Manage saves</a>
	<fieldset>
	<legend>Choose a Game Boy ROM</legend>
	<label>ROM: <input type="file" id="rom"></label>
	<input type="button" id="load-rom" value="Load ROM">
	</fieldset>
	
	<canvas id="lcd" width="160" height="144"></canvas>
	<div id="buttons">
		<div id="up-button" class="touch-button">up</div>
		<div id="down-button" class="touch-button">down</div>
		<div id="left-button" class="touch-button">left</div>
		<div id="right-button" class="touch-button">right</div>
		<div id="b-button" class="touch-button">b</div>
		<div id="a-button" class="touch-button">a</div>
		<div id="start-button" class="touch-button">start</div>
		<div id="select-button" class="touch-button">select</div>
	</div>
	
	<!--<input type="button" id="log-uncompiled" value="Log Uncompiled" />-->
	<h2>Controls:</h2>
	<p>
		A: <kbd><kbd>Z</kbd></kbd>,
		B: <kbd><kbd>X</kbd></kbd>,
		Start: <kbd><kbd>Enter</kbd></kbd>,
		Select: <kbd><kbd>Backspace</kbd></kbd>,
		D-pad: <kbd><kbd>&uarr;</kbd></kbd> <kbd><kbd>&darr;</kbd></kbd> <kbd><kbd>&larr;</kbd></kbd> <kbd><kbd>&rarr;</kbd></kbd>
	</p>
	<label>Speed multiplier: <input type="number" id="speed" value="500"></label>
	
	<div id="error-log" hidden>
		<h2>Error Log</h2>
		<pre><output></output></pre>
	</div>
	
	<h2>Runtime Stats</h2>
	<p id="frametimes"></p>
	<p>Basic JIT blocks: <span id="jit-block-count">0</span></p>
</body>
</html>
